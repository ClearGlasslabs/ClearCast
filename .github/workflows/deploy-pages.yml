# service_owner: Platform Owner (ClearGlassInc Artemis)
# escalation: DevOps Engineer -> Security Lead -> Incident Commander
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js (if package.json exists)
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build app (Node projects)
        if: ${{ hashFiles('package.json') != '' }}
        run: |
          set -euo pipefail
          npm ci
          npm run build

      - name: Build app (plain static fallback)
        if: ${{ hashFiles('package.json') == '' }}
        run: |
          set -euo pipefail
          mkdir -p _site
          rsync -av --delete --exclude '.git' --exclude '.github' --exclude 'node_modules' --exclude '_site' ./ ./_site/
          test -f _site/index.html
          touch _site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Select artifact path
        id: artifact
        run: |
          set -euo pipefail
          if [ -d dist ]; then
            echo "path=dist" >> "$GITHUB_OUTPUT"
          elif [ -d build ]; then
            echo "path=build" >> "$GITHUB_OUTPUT"
          elif [ -d out ]; then
            echo "path=out" >> "$GITHUB_OUTPUT"
          elif [ -d _site ]; then
            echo "path=_site" >> "$GITHUB_OUTPUT"
          else
            echo "No known build output found (dist/build/out/_site)" >&2
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ steps.artifact.outputs.path }}

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
