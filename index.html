<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NEXUS OMEGA · ClearGlass Quantum Intelligence Core · v11.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- Ambient layers -->
  <canvas id="starfield" aria-hidden="true"></canvas>
  <div class="scanlines"  aria-hidden="true"></div>
  <div class="vignette"   aria-hidden="true"></div>

  <!-- ── Boot Screen ─────────────────────────────────────────────────────── -->
  <div id="boot-screen" class="boot-screen">
    <div class="boot-logo">
      <div class="boot-hex">⬡</div>
      <div class="boot-title">NEXUS OMEGA</div>
      <div class="boot-sub">ClearGlass Quantum Intelligence Core · v11.0</div>
    </div>
    <div id="boot-log" class="boot-log"></div>
    <div class="boot-progress-wrap">
      <div id="boot-progress-bar" class="boot-progress-bar"></div>
    </div>
  </div>

  <!-- ── Main Application (hidden until boot completes) ──────────────────── -->
  <div id="app" class="app" style="display:none">

    <header id="app-header" class="app-header"></header>

    <!-- Live data ticker -->
    <div class="ticker-bar">
      <span class="ticker-live-badge">LIVE</span>
      <div class="ticker-track">
        <div id="ticker-content" class="ticker-content"></div>
      </div>
    </div>

    <!-- Tab navigation -->
    <nav id="app-nav" class="app-nav"></nav>

    <!-- Tab panes -->
    <main id="app-main" class="app-main">
      <div id="tab-dashboard"    class="tab-pane active"></div>
      <div id="tab-pipeline"     class="tab-pane"></div>
      <div id="tab-contracts"    class="tab-pane"></div>
      <div id="tab-tasks"        class="tab-pane"></div>
      <div id="tab-quantum"      class="tab-pane"></div>
      <div id="tab-ai"           class="tab-pane"></div>
      <div id="tab-surveillance" class="tab-pane"></div>
    </main>

  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
