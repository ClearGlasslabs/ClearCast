<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#007bff" />
    <title>ClearGlassInc Intelligence App</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <header>
        <h1>ClearGlassInc Intelligence App</h1>
        <p>Real-Time Nerve Live Tracking</p>
    </header>

    <main>
        <canvas id="nerveCanvas" width="400" height="300" aria-label="Animated nerve tracking visualization"></canvas>

        <section id="dataDisplay" aria-live="polite">
            <h2>Live Tracking Information</h2>
            <p id="signalStrength">Signal Strength: Calculating...</p>
            <p id="nerveActivity">Nerve Activity: Initializing...</p>
            <p id="trackingStatus">Tracking Status: Offline</p>
        </section>
    </main>

    <footer>
        <p>© 2026 ClearGlassInc. Developed for Desmond Otieno.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
